        // --- Core Logic: EAN-13 Check Digit Calculation ---
        function calculateCheckDigit(paddedStr) {
            let sum = 0;
            // EAN-13 weights: Odd positions (0-indexed) * 1, Even positions * 3
            for (let i = 0; i < 12; i++) {
                let digit = parseInt(paddedStr[i]);
                sum += digit * (i % 2 === 0 ? 1 : 3);
            }
            let remainder = sum % 10;
            return remainder === 0 ? 0 : 10 - remainder;
        }

        // --- Core Logic: Pad and Append Check Digit ---
        function generateEAN13(numberStr) {
            // Pad with leading zeros to make it exactly 12 characters long
            let padded = numberStr.padStart(12, '0');
            
            // If the OCR picked up something longer than 12 digits, truncate it for safety
            if (padded.length > 12) {
                padded = padded.substring(0, 12);
            }
            
            let checkDigit = calculateCheckDigit(padded);
            return padded + checkDigit;
        }
