<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Barcode Scanner & Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #1a5a30; --accent: #2e7d32; }
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        h1 { color: var(--primary); margin-top: 0; text-align: center; }
        
        .upload-section { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px; margin: 1rem 0; background: #fafafa; cursor: pointer; }
        input[type="file"] { display: none; }
        
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:disabled { background: #999; cursor: not-allowed; }

        .progress-container { width: 100%; background: #eee; border-radius: 10px; height: 12px; margin: 1.5rem 0; display: none; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        
        #status { margin: 1rem 0; padding: 10px; border-radius: 6px; font-size: 0.9rem; text-align: center; display: none; }
        
        /* Barcode Gallery Styles */
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 2rem; }
        .barcode-card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .barcode-card svg { width: 100%; height: auto; max-width: 150px; }
        .barcode-label { font-size: 0.75rem; color: #666; margin-top: 5px; font-family: monospace; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Stock Scanner</h1>
    <p style="text-align: center; font-size: 0.9rem;">Upload report photos to generate a PDF and view barcodes below.</p>
    
    <label class="upload-section" for="imageInput">
        <strong>Click to Select Photos</strong>
        <p style="font-size: 0.8rem; color: #666; margin-top: 5px;">(You can select multiple images)</p>
        <input type="file" id="imageInput" accept="image/*" multiple>
    </label>

    <div class="progress-container" id="pBox">
        <div id="progress-bar"></div>
    </div>
    
    <div id="status"></div>
    <button id="processBtn">Process & Generate</button>
</div>

<h2 id="gallery-title" style="display:none; color: var(--primary);">Scannable Barcodes</h2>
<div id="gallery"></div>

<canvas id="tempCanvas"></canvas>

<script>
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');
    const gallery = document.getElementById('gallery');
    const progressBar = document.getElementById('progress-bar');
    const pBox = document.getElementById('pBox');

    processBtn.addEventListener('click', async () => {
        const files = imageInput.files;
        if (files.length === 0) return alert("Please select at least one image.");

        processBtn.disabled = true;
        pBox.style.display = 'block';
        gallery.innerHTML = "";
        document.getElementById('gallery-title').style.display = 'none';
        
        const uniqueUpcs = new Set();
        const worker = await Tesseract.createWorker('eng');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789' });

        try {
            for (let i = 0; i < files.length; i++) {
                updateStatus(`Reading image ${i + 1} of ${files.length}...`, "#e3f2fd", "#0d47a1");
                const ret = await worker.recognize(files[i]);
                const matches = ret.data.text.match(/\d{7,13}/g) || [];
                matches.forEach(m => uniqueUpcs.add(m));
                progressBar.style.width = ((i + 1) / files.length) * 100 + "%";
            }

            await worker.terminate();

            if (uniqueUpcs.size === 0) throw new Error("No codes detected. Ensure photos are clear.");

            displayAndDownload([...uniqueUpcs]);
            updateStatus(`Found ${uniqueUpcs.size} unique codes!`, "#e8f5e9", "#1b5e20");

        } catch (err) {
            updateStatus("Error: " + err.message, "#ffebee", "#c62828");
        } finally {
            processBtn.disabled = false;
        }
    });

    function displayAndDownload(codes) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        let y = 20;
        document.getElementById('gallery-title').style.display = 'block';

        codes.forEach((code, index) => {
            let ean = code.padStart(12, '0').substring(0, 12);
            
            // 1. Create Gallery Item (SVG for high quality display)
            const card = document.createElement('div');
            card.className = 'barcode-card';
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            card.appendChild(svg);
            const label = document.createElement('div');
            label.className = 'barcode-label';
            label.textContent = code;
            card.appendChild(label);
            gallery.appendChild(card);

            try {
                // Generate for Gallery
                JsBarcode(svg, ean, { format: "EAN13", width: 2, height: 50, displayValue: true });

                // 2. Generate for PDF
                const canvas = document.getElementById('tempCanvas');
                JsBarcode(canvas, ean, { format: "EAN13", width: 2, height: 45 });
                const imgData = canvas.toDataURL('image/png');

                if (y > 260) { pdf.addPage(); y = 20; }
                pdf.setFontSize(9);
                pdf.text(`Code: ${code}`, 20, y);
                pdf.addImage(imgData, 'PNG', 20, y + 2, 50, 25);
                y += 35;
            } catch (e) { console.error("Invalid:", code); }
        });

        pdf.save("Requisition_Barcodes.pdf");
    }

    function updateStatus(msg, bg, color) {
        status.textContent = msg;
        status.style.display = 'block';
        status.style.background = bg;
        status.style.color = color;
    }
</script>

</body>
</html>
