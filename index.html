<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eusso Creon Calc - 1:8 Ratio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; color: #38bdf8; margin-bottom: 0.5rem; text-align: center; }
        p.subtitle { font-size: 0.8rem; color: #94a3b8; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 0.5rem; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0ea5e9; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #334155; border-radius: 0.5rem; min-height: 50px; display: none; }
        .dose-num { font-size: 2rem; color: #22c55e; display: block; margin-top: 5px; }
        .loading { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Creon AI Calculator</h1>
        <p class="subtitle">Ratio 1:8g | Goal 65kg | Absorption Plus Mode</p>
        
        <input type="text" id="foodInput" placeholder="What are you eating? (e.g. 2 scotch pancakes)">
        <button onclick="getAIDose()">Calculate Dose</button>

        <div id="result"></div>
    </div>

<script>
    // 1. Ensure the key is in quotes
    const API_KEY = "AIzaSyBsq6w3UGxYxLP5zllMj_GMvvTLa4pq0GA"; 

    async function getAIDose() {
        const input = document.getElementById('foodInput').value;
        const resultDiv = document.getElementById('result');
        if (!input) return;
        
        resultDiv.style.display = "block";
        resultDiv.innerHTML = '<span class="loading">Connecting to Gemini...</span>';

        // Using the stable V1 endpoint for 1.5-flash
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Estimate fat for: ${input}. Use 1 Creon per 8g fat. Round up.` }] }]
                })
            });

            const data = await response.json();
            
            if (response.ok) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = aiResponse;
            } else {
                // THIS WILL TELL US THE PROBLEM (e.g., 403 Forbidden or 400 Bad Request)
                resultDiv.innerHTML = `Error ${response.status}: ${data.error.message}`;
            }
        } catch (error) {
            resultDiv.innerHTML = "Connection Failed. Try a different browser or check your Key.";
        }
    }
</script>
</body>
</html>
