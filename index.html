<script>
function getCheckDigit(code) {
    let sum = 0;
    for (let i = 0; i < 12; i++) {
        sum += parseInt(code[i]) * (i % 2 === 0 ? 1 : 3);
    }
    return (10 - (sum % 10)) % 10;
}

function generateBarcodes() {
    // Check library
    if (typeof JsBarcode === 'undefined') {
        alert("The barcode library failed to load from GitHub. Try refreshing or use the direct file link.");
        return;
    }

    const input = document.getElementById("input").value.trim().split("\n");
    const container = document.getElementById("labels");
    container.innerHTML = "";

    input.forEach(line => {
        let code = line.trim();
        if (!code) return;

        while (code.length < 12) { code = "0" + code; }
        if (code.length > 12) { code = code.slice(-12); }

        const fullCode = code + getCheckDigit(code);
        const div = document.createElement("div");
        div.className = "label";
        const svg = document.createElement("svg");

        JsBarcode(svg, fullCode, {
            format: "EAN13",
            width: 2,
            height: 80,
            displayValue: true
        });

        div.appendChild(svg);
        container.appendChild(div);
    });
}

window.onload = generateBarcodes;
